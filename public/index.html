<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Media Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="sprocket-strip" id="sprocketStrip"></div>

<header class="site-header">
  <p class="eyebrow">Free to download</p>
  <h1 class="site-title" id="siteTitle">Media Vault</h1>
  <p class="site-tagline" id="siteTagline">Browse and download images and videos below — everything here is free to use.</p>

  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="Search by title…" />
    <span class="search-count" id="resultCount"></span>
  </div>
</header>

<main class="gallery-wrap">
  <div id="galleryGrid" class="gallery-grid"></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <span class="eyebrow">Nothing here yet</span>
    <p>Check back soon — new files are added regularly.</p>
  </div>
  <div id="loadingState" class="loading-state">Loading…</div>
  <div class="load-more-row" id="loadMoreRow" style="display:none;">
    <button class="btn-ghost" id="loadMoreBtn">Load more</button>
  </div>
</main>

<footer class="site-footer">All files on this page are free to download.</footer>

<div id="modalRoot"></div>

<script src="/gallery.js"></script>
</body>
</html>
